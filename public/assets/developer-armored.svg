<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="skinGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#C4956A"/>
    </linearGradient>
    <linearGradient id="armorRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946"/>
      <stop offset="100%" style="stop-color:#B91C2E"/>
    </linearGradient>
    <linearGradient id="armorGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A261"/>
      <stop offset="100%" style="stop-color:#D4852E"/>
    </linearGradient>
    <linearGradient id="reactorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#0088AA"/>
    </linearGradient>
    <linearGradient id="holoScreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="reactorGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="energyGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="#0A0A0F" rx="12"/>
  
  <!-- Hex grid -->
  <g opacity="0.04" stroke="#00D4FF" stroke-width="0.5" fill="none">
    <line x1="0" y1="50" x2="500" y2="50"/><line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="150" x2="500" y2="150"/><line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="250" x2="500" y2="250"/><line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="350" x2="500" y2="350"/><line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="50" y1="0" x2="50" y2="500"/><line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/><line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
  </g>
  
  <!-- Energy particles background -->
  <g filter="url(#energyGlow)" opacity="0.3">
    <circle cx="60" cy="80" r="2" fill="#E63946"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="440" cy="120" r="1.5" fill="#F4A261"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="300" r="2" fill="#00D4FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="470" cy="350" r="1.5" fill="#E63946"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="450" r="2" fill="#F4A261"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/></circle>
  </g>
  
  <!-- Desk -->
  <rect x="80" y="340" width="340" height="8" rx="4" fill="#1A1A25" stroke="#1E1E2E" stroke-width="1"/>
  <rect x="100" y="348" width="10" height="60" rx="2" fill="#1A1A25"/>
  <rect x="390" y="348" width="10" height="60" rx="2" fill="#1A1A25"/>
  
  <!-- Holographic laptop display -->
  <g transform="rotate(-5, 250, 310)">
    <rect x="160" y="170" width="180" height="140" rx="6" fill="#111118" stroke="#00D4FF" stroke-width="1" opacity="0.8"/>
    <rect x="165" y="175" width="170" height="130" rx="3" fill="url(#holoScreen)"/>
    <!-- Holographic code lines -->
    <g opacity="0.8">
      <rect x="175" y="185" width="65" height="3" rx="1" fill="#E63946" opacity="0.9"/>
      <rect x="245" y="185" width="45" height="3" rx="1" fill="#00D4FF" opacity="0.7"/>
      <rect x="175" y="195" width="35" height="3" rx="1" fill="#F4A261" opacity="0.7"/>
      <rect x="215" y="195" width="85" height="3" rx="1" fill="#00D4FF" opacity="0.5"/>
      <rect x="185" y="205" width="55" height="3" rx="1" fill="#00D4FF" opacity="0.6"/>
      <rect x="245" y="205" width="35" height="3" rx="1" fill="#E63946" opacity="0.5"/>
      <rect x="185" y="215" width="75" height="3" rx="1" fill="#6B7280" opacity="0.4"/>
      <rect x="175" y="225" width="50" height="3" rx="1" fill="#F4A261" opacity="0.6"/>
      <rect x="230" y="225" width="60" height="3" rx="1" fill="#00D4FF" opacity="0.5"/>
      <rect x="185" y="235" width="65" height="3" rx="1" fill="#6B7280" opacity="0.4"/>
      <rect x="175" y="245" width="40" height="3" rx="1" fill="#E63946" opacity="0.7"/>
      <rect x="220" y="245" width="50" height="3" rx="1" fill="#00D4FF" opacity="0.5"/>
      <rect x="185" y="255" width="85" height="3" rx="1" fill="#6B7280" opacity="0.4"/>
      <rect x="175" y="265" width="55" height="3" rx="1" fill="#F4A261" opacity="0.6"/>
      <rect x="235" y="265" width="45" height="3" rx="1" fill="#00D4FF" opacity="0.4"/>
      <rect x="175" y="275" width="30" height="3" rx="1" fill="#E63946" opacity="0.5"/>
      <rect x="210" y="275" width="60" height="3" rx="1" fill="#6B7280" opacity="0.3"/>
      <rect x="175" y="285" width="70" height="3" rx="1" fill="#00D4FF" opacity="0.4"/>
    </g>
    <!-- Screen glow -->
    <rect x="160" y="170" width="180" height="140" rx="6" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.3" filter="url(#glow2)"/>
  </g>
  <!-- Laptop base -->
  <rect x="150" y="310" width="200" height="30" rx="4" fill="#1E1E2E" stroke="#2A2A35" stroke-width="1.5"/>
  
  <!-- Armor body -->
  <ellipse cx="250" cy="375" rx="82" ry="52" fill="url(#armorRed)" stroke="#B91C2E" stroke-width="1"/>
  <!-- Armor chest plate details -->
  <path d="M 210 345 L 250 335 L 290 345 L 285 385 L 250 395 L 215 385 Z" fill="url(#armorRed)" stroke="#F4A261" stroke-width="1" opacity="0.8"/>
  <!-- Gold accents on chest -->
  <path d="M 230 350 L 250 342 L 270 350" fill="none" stroke="#F4A261" stroke-width="1.5"/>
  <path d="M 225 365 L 250 358 L 275 365" fill="none" stroke="#F4A261" stroke-width="1"/>
  <!-- Armor shoulder pads -->
  <ellipse cx="175" cy="345" rx="25" ry="18" fill="url(#armorRed)" stroke="#F4A261" stroke-width="1"/>
  <ellipse cx="325" cy="345" rx="25" ry="18" fill="url(#armorRed)" stroke="#F4A261" stroke-width="1"/>
  
  <!-- ARC REACTOR -->
  <g filter="url(#reactorGlow)" transform="translate(250, 365)">
    <circle r="18" fill="#0A0A0F" stroke="#00D4FF" stroke-width="2"/>
    <circle r="14" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle r="10" fill="none" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="5 3">
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" fill="#00D4FF" opacity="0.8">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#ffffff" opacity="0.9"/>
    <!-- Reactor triangles -->
    <g opacity="0.5">
      <polygon points="0,-15 3,-10 -3,-10" fill="#00D4FF"/>
      <polygon points="15,0 10,3 10,-3" fill="#00D4FF"/>
      <polygon points="0,15 3,10 -3,10" fill="#00D4FF"/>
      <polygon points="-15,0 -10,3 -10,-3" fill="#00D4FF"/>
    </g>
  </g>
  
  <!-- Cyan energy lines on armor -->
  <g opacity="0.4" stroke="#00D4FF" stroke-width="0.8" filter="url(#energyGlow)">
    <line x1="220" y1="355" x2="200" y2="345"/>
    <line x1="280" y1="355" x2="300" y2="345"/>
    <line x1="230" y1="380" x2="215" y2="395"/>
    <line x1="270" y1="380" x2="285" y2="395"/>
  </g>
  
  <!-- Neck -->
  <rect x="237" y="290" width="26" height="25" rx="4" fill="url(#skinGrad2)"/>
  <!-- Armor collar -->
  <path d="M 220 310 Q 250 320 280 310 Q 285 305 280 300 Q 250 308 220 300 Q 215 305 220 310 Z" fill="url(#armorRed)" stroke="#F4A261" stroke-width="0.8"/>
  
  <!-- Head -->
  <ellipse cx="250" cy="258" rx="50" ry="55" fill="url(#skinGrad2)"/>
  
  <!-- Hair -->
  <path d="M 200 248 Q 200 198 230 193 Q 250 186 275 193 Q 305 203 300 248 Q 300 233 285 223 Q 270 208 250 206 Q 225 208 215 228 Q 205 238 200 248 Z" fill="#1a1a1a"/>
  <path d="M 210 238 Q 220 213 250 208 Q 265 206 275 210" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <ellipse cx="235" cy="258" rx="7" ry="5" fill="#1a1a1a"/>
  <ellipse cx="265" cy="258" rx="7" ry="5" fill="#1a1a1a"/>
  <circle cx="236" cy="257" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="266" cy="257" r="1.5" fill="#ffffff" opacity="0.7"/>
  <!-- Determined eyebrows -->
  <path d="M 224 248 Q 235 243 245 247" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 255 247 Q 265 243 276 248" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 250 260 L 247 273 Q 250 276 253 273 Z" fill="#C4956A" opacity="0.6"/>
  
  <!-- Confident smile -->
  <path d="M 240 280 Q 250 286 260 280" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Beard area -->
  <path d="M 225 278 Q 250 303 275 278" fill="#1a1a1a" opacity="0.15"/>
  <g opacity="0.2" stroke="#1a1a1a" stroke-width="0.5">
    <line x1="235" y1="283" x2="235" y2="293"/><line x1="245" y1="285" x2="245" y2="296"/>
    <line x1="250" y1="286" x2="250" y2="298"/><line x1="255" y1="285" x2="255" y2="296"/>
    <line x1="265" y1="283" x2="265" y2="293"/>
  </g>
  <!-- Mustache -->
  <path d="M 240 276 Q 250 280 260 276" fill="#1a1a1a" opacity="0.25" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Armor arms -->
  <path d="M 175 360 Q 155 340 165 305 L 178 305 Q 170 335 183 355 Z" fill="url(#armorRed)" stroke="#F4A261" stroke-width="0.8"/>
  <path d="M 325 360 Q 345 340 335 305 L 322 305 Q 330 335 317 355 Z" fill="url(#armorRed)" stroke="#F4A261" stroke-width="0.8"/>
  <!-- Gold arm accents -->
  <rect x="160" y="315" width="22" height="4" rx="2" fill="url(#armorGold)" opacity="0.8"/>
  <rect x="318" y="315" width="22" height="4" rx="2" fill="url(#armorGold)" opacity="0.8"/>
  
  <!-- Armored hands on laptop -->
  <ellipse cx="190" cy="323" rx="16" ry="9" fill="url(#armorGold)" stroke="#D4852E" stroke-width="0.5"/>
  <ellipse cx="310" cy="323" rx="16" ry="9" fill="url(#armorGold)" stroke="#D4852E" stroke-width="0.5"/>
  
  <!-- Floating HUD elements -->
  <g filter="url(#glow2)" opacity="0.5">
    <!-- HUD bracket left -->
    <g transform="translate(35, 130)">
      <rect width="60" height="40" rx="3" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
      <text x="8" y="18" font-family="monospace" font-size="9" fill="#00D4FF" opacity="0.7">SYS: OK</text>
      <text x="8" y="30" font-family="monospace" font-size="8" fill="#F4A261" opacity="0.5">PWR: 100%</text>
    </g>
    <!-- HUD data right -->
    <g transform="translate(405, 220)">
      <rect width="65" height="50" rx="3" fill="none" stroke="#E63946" stroke-width="1" opacity="0.3"/>
      <text x="8" y="16" font-family="monospace" font-size="8" fill="#E63946" opacity="0.6">NEURAL</text>
      <text x="8" y="28" font-family="monospace" font-size="8" fill="#E63946" opacity="0.6">NET: ON</text>
      <text x="8" y="42" font-family="monospace" font-size="8" fill="#00D4FF" opacity="0.5">ACC: 98.4%</text>
    </g>
    <!-- Code floating -->
    <text x="55" y="250" font-family="monospace" font-size="18" fill="#F4A261" opacity="0.35">{ }</text>
    <text x="415" y="140" font-family="monospace" font-size="16" fill="#00D4FF" opacity="0.3">&lt;/&gt;</text>
    <text x="40" y="400" font-family="monospace" font-size="12" fill="#E63946" opacity="0.25">def AI()</text>
    <text x="390" y="430" font-family="monospace" font-size="11" fill="#00D4FF" opacity="0.2">01001</text>
  </g>
  
  <!-- Holographic side panel -->
  <g transform="translate(380, 80)" opacity="0.2" filter="url(#glow2)">
    <rect width="4" height="20" rx="2" fill="#00D4FF"/>
    <rect x="7" y="5" width="4" height="12" rx="2" fill="#00D4FF"/>
    <rect x="14" y="-3" width="4" height="22" rx="2" fill="#00D4FF"/>
    <rect x="21" y="2" width="4" height="16" rx="2" fill="#00D4FF"/>
    <rect x="28" y="8" width="4" height="10" rx="2" fill="#00D4FF"/>
    <rect x="35" y="3" width="4" height="14" rx="2" fill="#00D4FF"/>
  </g>
</svg>
