<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#C4956A"/>
    </linearGradient>
    <linearGradient id="hoodieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A35"/>
      <stop offset="100%" style="stop-color:#1A1A25"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="codeGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="#0A0A0F" rx="12"/>
  
  <!-- Hex grid (very subtle) -->
  <g opacity="0.03" stroke="#00D4FF" stroke-width="0.5" fill="none">
    <line x1="0" y1="50" x2="500" y2="50"/><line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="150" x2="500" y2="150"/><line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="250" x2="500" y2="250"/><line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="350" x2="500" y2="350"/><line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="50" y1="0" x2="50" y2="500"/><line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/><line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
  </g>
  
  <!-- Desk -->
  <rect x="80" y="340" width="340" height="8" rx="4" fill="#1A1A25" stroke="#1E1E2E" stroke-width="1"/>
  <rect x="100" y="348" width="10" height="60" rx="2" fill="#1A1A25"/>
  <rect x="390" y="348" width="10" height="60" rx="2" fill="#1A1A25"/>
  
  <!-- Laptop base -->
  <rect x="150" y="310" width="200" height="30" rx="4" fill="#1E1E2E" stroke="#2A2A35" stroke-width="1"/>
  
  <!-- Laptop screen -->
  <g transform="rotate(-5, 250, 310)">
    <rect x="160" y="180" width="180" height="130" rx="6" fill="#111118" stroke="#2A2A35" stroke-width="1.5"/>
    <rect x="165" y="185" width="170" height="120" rx="3" fill="url(#screenGrad)"/>
    <!-- Code lines on screen -->
    <g opacity="0.7">
      <rect x="175" y="195" width="60" height="3" rx="1" fill="#E63946" opacity="0.8"/>
      <rect x="240" y="195" width="40" height="3" rx="1" fill="#00D4FF" opacity="0.5"/>
      <rect x="175" y="205" width="30" height="3" rx="1" fill="#F4A261" opacity="0.6"/>
      <rect x="210" y="205" width="80" height="3" rx="1" fill="#6B7280" opacity="0.4"/>
      <rect x="185" y="215" width="50" height="3" rx="1" fill="#00D4FF" opacity="0.5"/>
      <rect x="240" y="215" width="30" height="3" rx="1" fill="#E63946" opacity="0.4"/>
      <rect x="185" y="225" width="70" height="3" rx="1" fill="#6B7280" opacity="0.3"/>
      <rect x="175" y="235" width="45" height="3" rx="1" fill="#F4A261" opacity="0.5"/>
      <rect x="225" y="235" width="55" height="3" rx="1" fill="#00D4FF" opacity="0.4"/>
      <rect x="185" y="245" width="60" height="3" rx="1" fill="#6B7280" opacity="0.3"/>
      <rect x="175" y="255" width="35" height="3" rx="1" fill="#E63946" opacity="0.6"/>
      <rect x="215" y="255" width="45" height="3" rx="1" fill="#00D4FF" opacity="0.4"/>
      <rect x="185" y="265" width="80" height="3" rx="1" fill="#6B7280" opacity="0.3"/>
      <rect x="175" y="275" width="50" height="3" rx="1" fill="#F4A261" opacity="0.5"/>
      <rect x="230" y="275" width="40" height="3" rx="1" fill="#6B7280" opacity="0.3"/>
      <rect x="175" y="285" width="25" height="3" rx="1" fill="#E63946" opacity="0.4"/>
    </g>
    <!-- Screen glow -->
    <rect x="160" y="180" width="180" height="130" rx="6" fill="none" stroke="#00D4FF" stroke-width="0.5" opacity="0.2"/>
  </g>
  
  <!-- Character body (hoodie) -->
  <ellipse cx="250" cy="380" rx="80" ry="50" fill="url(#hoodieGrad)" stroke="#2A2A35" stroke-width="0.5"/>
  <!-- Hoodie neckline -->
  <path d="M 220 330 Q 250 345 280 330" fill="none" stroke="#2A2A35" stroke-width="1.5"/>
  
  <!-- Neck -->
  <rect x="237" y="290" width="26" height="30" rx="4" fill="url(#skinGrad)"/>
  
  <!-- Head -->
  <ellipse cx="250" cy="260" rx="50" ry="55" fill="url(#skinGrad)"/>
  
  <!-- Hair -->
  <path d="M 200 250 Q 200 200 230 195 Q 250 188 275 195 Q 305 205 300 250 Q 300 235 285 225 Q 270 210 250 208 Q 225 210 215 230 Q 205 240 200 250 Z" fill="#1a1a1a"/>
  <!-- Hair wave detail -->
  <path d="M 210 240 Q 220 215 250 210 Q 265 208 275 212" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <ellipse cx="235" cy="260" rx="7" ry="5" fill="#1a1a1a"/>
  <ellipse cx="265" cy="260" rx="7" ry="5" fill="#1a1a1a"/>
  <circle cx="236" cy="259" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="266" cy="259" r="1.5" fill="#ffffff" opacity="0.7"/>
  <!-- Eyebrows -->
  <path d="M 225 250 Q 235 246 245 250" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M 255 250 Q 265 246 275 250" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 250 262 L 247 275 Q 250 278 253 275 Z" fill="#C4956A" opacity="0.6"/>
  
  <!-- Smile -->
  <path d="M 238 282 Q 250 290 262 282" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Beard/stubble area -->
  <path d="M 225 280 Q 250 305 275 280" fill="#1a1a1a" opacity="0.15"/>
  <!-- Light beard lines -->
  <g opacity="0.2" stroke="#1a1a1a" stroke-width="0.5">
    <line x1="235" y1="285" x2="235" y2="295"/>
    <line x1="245" y1="287" x2="245" y2="298"/>
    <line x1="250" y1="288" x2="250" y2="300"/>
    <line x1="255" y1="287" x2="255" y2="298"/>
    <line x1="265" y1="285" x2="265" y2="295"/>
  </g>
  
  <!-- Mustache -->
  <path d="M 240 278 Q 250 282 260 278" fill="#1a1a1a" opacity="0.25" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Arms -->
  <path d="M 175 360 Q 160 340 170 310 L 180 310 Q 175 335 185 350 Z" fill="url(#hoodieGrad)" stroke="#2A2A35" stroke-width="0.5"/>
  <path d="M 325 360 Q 340 340 330 310 L 320 310 Q 325 335 315 350 Z" fill="url(#hoodieGrad)" stroke="#2A2A35" stroke-width="0.5"/>
  
  <!-- Hands on laptop -->
  <ellipse cx="190" cy="325" rx="15" ry="8" fill="url(#skinGrad)" opacity="0.9"/>
  <ellipse cx="310" cy="325" rx="15" ry="8" fill="url(#skinGrad)" opacity="0.9"/>
  
  <!-- Floating code elements -->
  <g filter="url(#glow)" opacity="0.6">
    <!-- Code bracket left -->
    <text x="60" y="150" font-family="monospace" font-size="28" fill="#00D4FF" opacity="0.4">{ }</text>
    <!-- Code bracket right -->
    <text x="400" y="200" font-family="monospace" font-size="22" fill="#F4A261" opacity="0.35">&lt;/&gt;</text>
    <!-- Python -->
    <text x="80" y="250" font-family="monospace" font-size="14" fill="#00D4FF" opacity="0.3">def</text>
    <!-- Data points -->
    <text x="420" y="300" font-family="monospace" font-size="16" fill="#E63946" opacity="0.3">01</text>
    <text x="50" y="380" font-family="monospace" font-size="12" fill="#F4A261" opacity="0.25">class</text>
    <text x="410" y="130" font-family="monospace" font-size="14" fill="#00D4FF" opacity="0.25">AI</text>
  </g>
  
  <!-- Neural network nodes -->
  <g filter="url(#softGlow)" opacity="0.2">
    <circle cx="430" cy="380" r="4" fill="#00D4FF"/>
    <circle cx="450" cy="360" r="3" fill="#00D4FF"/>
    <circle cx="460" cy="390" r="3" fill="#00D4FF"/>
    <line x1="430" y1="380" x2="450" y2="360" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="430" y1="380" x2="460" y2="390" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="450" y1="360" x2="460" y2="390" stroke="#00D4FF" stroke-width="0.5"/>
    
    <circle cx="70" y1="120" cy="120" r="3" fill="#F4A261"/>
    <circle cx="50" cy="100" r="2.5" fill="#F4A261"/>
    <circle cx="90" cy="105" r="2.5" fill="#F4A261"/>
    <line x1="70" y1="120" x2="50" y2="100" stroke="#F4A261" stroke-width="0.5"/>
    <line x1="70" y1="120" x2="90" y2="105" stroke="#F4A261" stroke-width="0.5"/>
  </g>
  
  <!-- Floating data visualization -->
  <g transform="translate(400, 420)" opacity="0.15" filter="url(#glow)">
    <rect x="0" y="0" width="3" height="15" rx="1" fill="#00D4FF"/>
    <rect x="6" y="5" width="3" height="10" rx="1" fill="#00D4FF"/>
    <rect x="12" y="-2" width="3" height="17" rx="1" fill="#00D4FF"/>
    <rect x="18" y="3" width="3" height="12" rx="1" fill="#00D4FF"/>
    <rect x="24" y="7" width="3" height="8" rx="1" fill="#00D4FF"/>
  </g>
</svg>
